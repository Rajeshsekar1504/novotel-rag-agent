version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: novotel-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./documents:/app/documents
      - ./chroma_db:/app/chroma_db
      - ./hash_registry.json:/app/hash_registry.json

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: novotel-frontend

    ports:
      - "5175:5173"

    restart: unless-stopped

    depends_on:
      - backend